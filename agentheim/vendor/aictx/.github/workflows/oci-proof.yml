# OCI integration proof
#
# Proves OCI code paths are structurally sound via mocked tests.
# When OCI credentials / config are injected as secrets, uncomment
# the live validation steps for real end-to-end proof.
#
# This workflow runs on push/PR and does NOT require OCI secrets.

name: oci-proof

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mocked:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra oci

      - name: Run operational readiness tests
        run: uv run pytest tests/unit/test_operational_readiness.py -v -x --tb=short

      - name: Verify snapshot commands work (no OCI required)
        run: |
          uv run aictx snapshot create --project . --output .aictx/snapshots
          uv run aictx snapshot verify .aictx/snapshots/*.zip

      - name: Verify oci doctor works (no OCI SDK, expect ready=False)
        run: |
          uv run aictx oci doctor --project . --json
        continue-on-error: true  # non-ready is expected without OCI config