name: release-validation

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra oci

      - name: Ruff check
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy src

      - name: Unit tests
        run: uv run pytest tests/unit

      - name: Integration tests
        run: uv run pytest tests/integration tests/unit/test_operational_readiness.py

      - name: Build package
        run: uv build

      - name: Validate pipx install
        run: |
          python -m pip install pipx
          python -m pipx ensurepath
          python -m pipx install . --force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*
            docs/AIprojectcontext/validation-report.md