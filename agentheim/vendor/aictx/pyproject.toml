[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aictx"
version = "0.1.0"
description = "Local-first CLI tool that prepares Git repositories for low-token AI-agent work"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [
    { name = "0langa" }
]
keywords = ["ai", "cli", "context", "git", "repository"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
]

dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "pathspec>=0.12.0",
]

[project.optional-dependencies]
oci = [
    "oci>=2.120.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.3.0",
    "mypy>=1.9.0",
    # types-pathspec unavailable; mypy ignores pathspec via override
]

[project.scripts]
aictx = "aictx.cli:app"

[project.urls]
Homepage = "https://github.com/0langa/AICtx"
Repository = "https://github.com/0langa/AICtx.git"
Issues = "https://github.com/0langa/AICtx/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aictx"]

[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".git",
    ".venv",
    ".pytest-tmp",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    ".aictx/runs",
    ".aictx/cache",
    ".aictx/tmp",
    "build",
    "dist",
    "node_modules",
]
[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = ["E501"]  # Line too long (handled by formatter)

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.isort]
known-first-party = ["aictx"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unreachable = true
ignore_missing_imports = true
show_error_codes = true
exclude = ["tests/", "\\.git/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
norecursedirs = [".pytest-tmp"]

[dependency-groups]
dev = [
    "openai>=2.36.0",
]
