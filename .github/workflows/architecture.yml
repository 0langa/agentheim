name: Directive Governance
on: [pull_request, push]
jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.14' }
      - run: pip install --upgrade pip
      - run: pip install pytest pytest-cov fastapi starlette uvicorn pydantic requests beautifulsoup4 playwright rich typer filelock platformdirs numpy pyyaml openai httpx
      - run: playwright install chromium
      - run: pip install -e . --no-deps
      - run: python scripts/check-agent-instructions.py
      - run: pytest tests/ --cov --cov-fail-under=60 -q
